services:
  - type: web
    name: ytrag-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: GOOGLE_API_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
